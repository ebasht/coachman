<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Do NOT use viewport-fit=cover — on iPhone it recreates a huge white gap under compose. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Ямщик — защищённый мессенджер на вашем сервере. Приватные чаты, видеозвонки и совместные списки без зависимости от централизованных платформ." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Unbounded:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="/app-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/app-icon-192.png" />
    <link rel="apple-touch-icon" href="/app-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ямщик" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Ямщик</title>
    <script>
      // Register SW as early as possible so cold starts stay controlled after install.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
    <style>
      html, body {
        margin: 0;
        background: #ffffff;
        color: #000000;
        font-family: system-ui, -apple-system, sans-serif;
        height: 100%;
        overflow: hidden;
      }
      #root:empty {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
      }
      #root:empty::after {
        content: 'Загрузка…';
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
